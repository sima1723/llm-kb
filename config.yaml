# ============================================================
# API 密钥配置 — 在这里填入你的 Anthropic API Key
# 获取方式：https://console.anthropic.com → API Keys → Create Key
# ============================================================
api_key: ""   # 填入你的 sk-ant-... 密钥，或留空使用环境变量 ANTHROPIC_API_KEY

llm:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096          # 默认上限（compile 场景覆盖为 8192）
  retry_count: 3
  retry_delay_base: 2       # 指数退避基数（秒）
  # 按工具覆盖 max_tokens，避免简单任务浪费输出 token 预算
  max_tokens_by_tool:
    compile: 8192           # 需要完整 wiki 条目输出
    merge: 4096
    ask: 4096
    slides: 3000
    report_md: 4096
    report_brief: 1000
    explore: 2000
    lint_ai: 2000

compile:
  max_file_size_kb: 50       # 超过此大小分段处理
  budget_limit_usd: 5.0      # 单次 compile 费用上限
  input_price_per_mtok: 3.0  # Sonnet 输入价格
  output_price_per_mtok: 15.0 # Sonnet 输出价格

wiki:
  language: "zh"             # wiki 条目语言
  min_entry_length: 100      # 最小条目字数

paths:
  raw: "raw"
  wiki: "wiki"
  state: ".state"
  templates: "templates"
