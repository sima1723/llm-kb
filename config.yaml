# ============================================================
# API 密钥配置 — 在这里填入你的 Anthropic API Key
# 获取方式：https://console.anthropic.com → API Keys → Create Key
# ============================================================
api_key: ""   # 填入你的 API Key（Anthropic 原生 sk-ant-... 或中转服务的 key）
base_url: ""  # 留空 = 使用 Anthropic 官方 API；填中转地址如 https://api.anyruter.com

llm:
  model: "claude-sonnet-4-6"   # 默认模型（compile / ask / report / slides）
  max_tokens: 4096
  retry_count: 3
  retry_delay_base: 2

  # ── 按工具选用不同模型 ──────────────────────────────────────
  model_by_tool:
    # Haiku：简单任务，速度快，成本低
    stub_fill: "claude-haiku-4-5-20251001"   # stub 填充（训练知识直接输出）
    lint_ai:   "claude-haiku-4-5-20251001"   # lint 修复（格式/断链，规则简单）
    explore:   "claude-haiku-4-5-20251001"   # 探索建议（列举方向，无需深度推理）
    brief:     "claude-haiku-4-5-20251001"   # 一段话摘要（信息压缩）
    search:    "claude-haiku-4-5-20251001"   # 语义搜索（意图识别，短任务）
    # Sonnet：复杂任务（compile / ask / report / slides 使用默认模型）

  # ── 按工具覆盖 max_tokens ──────────────────────────────────
  max_tokens_by_tool:
    compile:      8192   # 需要完整 wiki 条目输出
    merge:        4096
    ask:          4096
    slides:       3000
    report:       4096
    brief:        1000
    explore:      2000
    lint_ai:      2000
    stub_fill:    2000
    search:       1000

  # ── 各模型计价（$/M tokens），用于费用统计 ──────────────────
  pricing:
    "claude-sonnet-4-6":
      input:  9.0
      output: 45.0
    "claude-haiku-4-5-20251001":
      input:  3.0
      output: 15.0
    "claude-opus-4-6":
      input:  15.0
      output: 75.0

compile:
  max_file_size_kb: 50
  budget_limit_usd: 5.0
  git_auto_commit: false     # 编译结束后自动 git commit wiki/（只暂存 wiki/ 目录）

wiki:
  language: "zh"             # wiki 条目语言
  min_entry_length: 100      # 最小条目字数

paths:
  raw: "raw"
  wiki: "wiki"
  state: ".state"
  templates: "templates"
